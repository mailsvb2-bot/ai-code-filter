name: AI Code Filter

on:
  pull_request:
  push:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package
        run: python -m pip install -U pip pytest && python -m pip install -e .
      - name: Compile package
        run: python -m compileall -q ai_code_filter ai_filter.py
      - name: Run unit and regression tests in stable chunks
        run: |
          python -m pytest -q tests/test_artifacts.py tests/test_assistant_capabilities.py tests/test_benchmarks.py tests/test_cli_and_filesystem.py tests/test_golden_reports.py tests/test_governance_and_plugins.py tests/test_integrity_layer.py tests/test_javascript_structure.py tests/test_parallel_pipeline.py tests/test_pipeline_cross_file_dataflow.py tests/test_python_cross_file_dataflow.py tests/test_python_dataflow.py tests/test_release_audit.py tests/test_rule_catalog.py tests/test_smoke.py tests/test_type_resolution.py tests/test_v15_regressions.py tests/test_v17_release_and_sdk_regressions.py
          python -m pytest -q tests/test_v19_integrity_regressions.py tests/test_v20_adversarial_suite.py tests/test_v22_external_audit_regressions.py tests/test_v23_blindspot_suite.py tests/test_v24_external_path_regressions.py tests/test_v25_path_portability_suite.py tests/test_v26_external_audit_hardening.py tests/test_v27_structured_hardening_suite.py tests/test_v28_external_encoding_manifest_hardening.py tests/test_v29_encoded_collision_hardening_suite.py tests/test_v30_external_audit_hardening.py tests/test_v31_provenance_honesty_suite.py tests/test_v32_provenance_honesty_hardening.py tests/test_v33_claim_evidence_contract.py tests/test_v34_claim_evidence_external_audit.py tests/test_v35_claim_summary_verification.py tests/test_v36_evidence_artifact_safety.py tests/test_v37_array_ambiguity.py
          python -m pytest -q tests/test_v38_capability_registry.py tests/test_v38_fuzz_suite.py tests/test_v38_mass_and_dependency_audit.py tests/test_v39_engine_hardening.py tests/test_v41_pipeline_profiles_governance.py tests/test_v42_idealization.py tests/test_v43_cross_file_precision.py tests/test_v44_keyword_binding_precision.py tests/test_v45_variadic_call_binding.py tests/test_v46_default_argument_taint.py tests/test_v47_db_consistency.py tests/test_v48_pytest_audit.py tests/test_v49_semantic_test_completeness.py tests/test_v50_behavior_audit.py tests/test_v51_project_call_graph.py tests/test_v52_quality_gates.py tests/test_v53_production_readiness_gates.py tests/test_v54_quality_amplification.py
          python -m pytest -q tests/test_v55_expanded_quality.py tests/test_v56_expanded_regression_surfaces.py tests/test_v57_grep_audit.py tests/test_v58_policy_scorecard_gates.py tests/test_v59_expansion.py tests/test_v9_compliance.py
      - name: Run deterministic benchmark
        run: ai-code-filter benchmark --ci --output ai-code-filter-benchmark.json
      - name: Run deterministic audit
        run: |
          ai-code-filter analyze . \
            --no-ai \
            --no-drift \
            --ci \
            --output ai-code-filter-report.json \
            --sarif ai-code-filter-report.sarif \
            --junit ai-code-filter-report.xml \
            --markdown ai-code-filter-report.md
      - name: Emit GitHub annotations and PR comment body
        run: |
          ai-code-filter github-integration ai-code-filter-report.json \
            --annotations ai-code-filter-annotations.txt \
            --pr-comment ai-code-filter-pr-comment.md \
            --summary-json ai-code-filter-github-integration.json
          cat ai-code-filter-annotations.txt
      - name: Validate SARIF for GitHub Code Scanning
        run: ai-code-filter sarif-github-audit ai-code-filter-report.sarif --ci --output ai-code-filter-sarif-github-audit.json
      - name: Build HTML trend dashboard
        run: ai-code-filter dashboard ai-code-filter-report.json --output ai-code-filter-dashboard.html
      - name: Audit first-class normalization packs
        run: ai-code-filter normalization-packs --packs-json ai-code-filter-normalization-packs.json
      - name: Audit real-world corpus manifest
        run: ai-code-filter real-world-corpus --manifest docs/REAL_WORLD_CORPUS_20.json --ci --summary-json ai-code-filter-real-world-corpus.json
      - name: Generate Docker sandbox command
        run: ai-code-filter docker-sandbox . --summary-json ai-code-filter-docker-sandbox.json
      - name: Run incremental PR mode smoke
        run: ai-code-filter incremental-pr . --changed-file ai_filter.py --summary-json ai-code-filter-incremental-pr.json
      - name: Run quality matrix
        run: ai-code-filter quality-matrix . --ci --summary-json ai-code-filter-quality-matrix.json
      - name: Run internal scorecard
        run: ai-code-filter scorecard . --ci --summary-json ai-code-filter-scorecard.json
      - name: Build release artifact for audit
        run: |
          tmp="$(mktemp -d)"
          root="$tmp/ai-code-filter-v59"
          mkdir -p "$root"
          rsync -a \
            --exclude '.git/' \
            --exclude 'MANIFEST.sha256' \
            --exclude '__pycache__/' \
            --exclude '*.pyc' \
            --exclude '.pytest_cache/' \
            --exclude '.mypy_cache/' \
            --exclude '.ruff_cache/' \
            --exclude 'build/' \
            --exclude 'dist/' \
            --exclude '*.egg-info/' \
            --exclude 'ai-code-filter-*' \
            ./ "$root/"
          ai-code-filter generate-manifest "$root" --output "$root/MANIFEST.sha256"
          (cd "$tmp" && zip -qr "$GITHUB_WORKSPACE/ai-code-filter-source.zip" ai-code-filter-v59)
      - name: Audit release artifact
        run: ai-code-filter release-audit ai-code-filter-source.zip --ci --output ai-code-filter-release-audit.json
      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ai-code-filter-report.sarif
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-code-filter-reports
          path: |
            ai-code-filter-report.json
            ai-code-filter-report.sarif
            ai-code-filter-report.xml
            ai-code-filter-report.md
            ai-code-filter-benchmark.json
            ai-code-filter-quality-matrix.json
            ai-code-filter-scorecard.json
            ai-code-filter-release-audit.json
            ai-code-filter-source.zip
            ai-code-filter-annotations.txt
            ai-code-filter-pr-comment.md
            ai-code-filter-github-integration.json
            ai-code-filter-sarif-github-audit.json
            ai-code-filter-dashboard.html
            ai-code-filter-normalization-packs.json
            ai-code-filter-real-world-corpus.json
            ai-code-filter-docker-sandbox.json
            ai-code-filter-incremental-pr.json
